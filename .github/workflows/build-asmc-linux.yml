name: Build and Release Asmc

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release 版本号（例如 v1.0.0），留空则不发布'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: quay.io/pypa/manylinux_2_28_x86_64
            label: manylinux_2_28

    steps:
      - name: Checkout asmc_linux source
        uses: actions/checkout@v5
        with:
          repository: nidud/asmc_linux
          ref: main
          path: asmc_linux

      - name: Compile inside ${{ matrix.label }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/asmc_linux \
            ${{ matrix.image }} \
            bash -c "
              echo '=== Compiler version ==='
              gcc --version
              echo '=== Patch Makefile for PIE compatibility ==='
              sed -i 's/gcc -c src\/\*\.s/gcc -c -fPIE src\/\*\.s/' Makefile
              echo '=== Starting build ==='
              make all
            "

      - name: Create tar.gz archive
        run: |
          cd asmc_linux
          tar -czvf asmc-${{ matrix.label }}.tar.gz asmc

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: asmc-${{ matrix.label }}
          path: asmc_linux/asmc-${{ matrix.label }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    # 授予写入权限，允许创建 Release
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded files
        run: ls -la ./artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/**/*.tar.gz
          overwrite: true   # 如果 tag 已存在则覆盖
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}