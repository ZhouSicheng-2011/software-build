name: Build Asmc on manylinux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: quay.io/pypa/manylinux2014_x86_64
            label: manylinux2014
          - image: quay.io/pypa/manylinux_2_28_x86_64
            label: manylinux_2_28

    steps:
      # 1. 关键：显式下载 asmc_linux 的源代码（这就是你想要的“下载源代码包”步骤）
      - name: Download asmc_linux source code
        uses: actions/checkout@v5
        with:
          repository: nidud/asmc_linux   # 指定外部仓库
          ref: main                      # 指定分支（可选）
          path: asmc_linux               # 指定存放的文件夹名

      # 2. 在容器内编译（挂载整个工作区，进入 asmc_linux 子目录编译）
      - name: Compile inside ${{ matrix.label }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/asmc_linux \
            ${{ matrix.image }} \
            bash -c "
              echo '=== Compiler version ==='
              gcc --version
              echo '=== Starting build ==='
              make
            "

      # 3. 上传产物（注意：产物在 asmc_linux 子目录下）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asmc-${{ matrix.label }}
          path: ./asmc_linux/asmc