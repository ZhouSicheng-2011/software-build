name: Build Asmc on manylinux

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 临时解决 Node.js 警告
    strategy:
      fail-fast: false    # 防止一个失败导致全部取消
      matrix:
        include:
          - image: quay.io/pypa/manylinux2014_x86_64
            label: manylinux2014
          - image: quay.io/pypa/manylinux_2_28_x86_64
            label: manylinux_2_28
    container:
      image: ${{ matrix.image }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5   # 升级到 v5 或 v6

      - name: 安装编译工具（gcc、make）
        run: |
          yum install -y gcc make
          gcc --version

      - name: 编译 asmc
        run: make

      - name: 列出产物
        run: ls -la

      - name: 上传二进制工件
        uses: actions/upload-artifact@v4
        with:
          name: asmc-${{ matrix.label }}
          path: ./asmc