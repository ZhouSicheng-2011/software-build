name: Build bit7z

on:
    workflow_dispatch:
        inputs:
            bit7z_version:
                description: "bit7z版本 (如4.0.12) "
                required: true
                type: string

jobs:
    build-for-manylinux_2_28:
        runs-on: ubuntu-latest
        container:
            image: quay.io/pypa/manylinux_2_28_x86_64
        steps:
            - name: Install packages
              run: yum install -y tar wget

            - name: Download 7zip-zstd source code + asmc-linux & extract & build 7-zip shared library
              run: |
                mkdir 7zip-build
                mkdir 7zip
                cd 7zip-build
                wget https://github.com/mcmilk/7-Zip-zstd/archive/refs/tags/v26.01-v1.5.7-R1.tar.gz
                wget https://github.com/ZhouSicheng-2011/software-build/releases/download/asmc-linux-2.36/asmc-manylinux_2_28.tar.gz
                tar -xzf asmc-manylinux_2_28.tar.gz
                chmod +x asmc
                tar -xzf v26.01-v1.5.7-R1.tar.gz
                cd 7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF
                make -f makefile.gcc -j1 USE_ASM=1 ASM=../../../../../asmc
                cd ../../../../../..
                cp 7zip-build/7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF/_o/7z.so 7zip/7z.so
                cp 7zip-build/v26.01-v1.5.7-R1.tar.gz v26.01-v1.5.7-R1.tar.gz
                rm -rf 7zip-build

            - name: Download bit7z source code & extract
              run: |
                wget "https://github.com/rikyoz/bit7z/archive/refs/tags/v${{ github.event.inputs.bit7z_version }}.tar.gz"
                tar -xzf v${{ github.event.inputs.bit7z_version }}.tar.gz
            
            - name: Prepare build environment & Run CMake configuration &Run make to compile
              run: |
                cd bit7z-${{ github.event.inputs.bit7z_version }}
                mkdir build
                cd build
                tar -xzf ../../v26.01-v1.5.7-R1.tar.gz
                cmake -S .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DBIT7Z_AUTO_FORMAT=ON -DBIT7Z_REGEX_MATCHING=ON -DBIT7Z_CUSTOM_7ZIP_PATH=7-Zip-zstd-26.01-v1.5.7-R1
                echo cmake -S .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DBIT7Z_AUTO_FORMAT=ON -DBIT7Z_REGEX_MATCHING=ON -DBIT7Z_CUSTOM_7ZIP_PATH=7-Zip-zstd-26.01-v1.5.7-R1 > ../cmake-opts.txt
                cmake --build . -j 1 --config Release
            
            - name: Collect all targets
              run: |
                tar -czvf bit7z-${{ github.event.inputs.bit7z_version }}-linux-gcc.tar.gz \
                bit7z-${{ github.event.inputs.bit7z_version }}/include \
                bit7z-${{ github.event.inputs.bit7z_version }}/lib \
                bit7z-${{ github.event.inputs.bit7z_version }}/cmake-opts.txt \
                7zip

            - name: Upload Artifact (tar.gz)
              uses: actions/upload-artifact@v4
              with:
                name: bit7z-${{ github.event.inputs.bit7z_version }}-linux-gcc
                path: bit7z-${{ github.event.inputs.bit7z_version }}-linux-gcc.tar.gz

    # ==================== Windows (MSVC) ====================
    build-for-windows:
      runs-on: windows-2022
      steps:
        - name: Setup MSVC Developer Command Prompt
          uses: ilammy/msvc-dev-cmd@v1
          with:
            arch: x64

        - name: Download 7zip-zstd source code & build 7-zip DLL
          shell: pwsh
          run: |
            mkdir 7zip-build
            mkdir 7zip
            cd 7zip-build
            curl -L -o v26.01-v1.5.7-R1.tar.gz https://github.com/mcmilk/7-Zip-zstd/archive/refs/tags/v26.01-v1.5.7-R1.tar.gz
            tar -xzf v26.01-v1.5.7-R1.tar.gz
            cd 7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF
            nmake -f makefile USE_ASM=1 PLATFORM=x64
            cd ../../../../../..
            cp 7zip-build/7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF/x64/7z.dll 7zip/7z.dll
            cp 7zip-build/7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF/x64/7z.lib 7zip/7z.lib
            cp 7zip-build/7-Zip-zstd-26.01-v1.5.7-R1/CPP/7zip/Bundles/Format7zF/x64/7z.exp 7zip/7z.exp
            cp 7zip-build/v26.01-v1.5.7-R1.tar.gz v26.01-v1.5.7-R1.tar.gz
            Remove-Item -Path 7zip-build -Recurse -Force

        - name: Download bit7z source code & extract
          shell: pwsh
          run: |
            curl -L -o v${{ github.event.inputs.bit7z_version }}.tar.gz "https://github.com/rikyoz/bit7z/archive/refs/tags/v${{ github.event.inputs.bit7z_version }}.tar.gz"
            tar -xzf v${{ github.event.inputs.bit7z_version }}.tar.gz

        - name: Prepare build, CMake, compile (NMake)
          shell: pwsh
          run: |
            cd bit7z-${{ github.event.inputs.bit7z_version }}
            mkdir build
            cd build
            tar -xzf ../../v26.01-v1.5.7-R1.tar.gz
            cmake -S .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DBIT7Z_AUTO_FORMAT=ON -DBIT7Z_REGEX_MATCHING=ON -DBIT7Z_CUSTOM_7ZIP_PATH=7-Zip-zstd-26.01-v1.5.7-R1 -B .
            echo cmake -S .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DBIT7Z_AUTO_FORMAT=ON -DBIT7Z_REGEX_MATCHING=ON -DBIT7Z_CUSTOM_7ZIP_PATH=7-Zip-zstd-26.01-v1.5.7-R1 -B . > ../cmake-opts.txt
            cmake --build . -j 1 --config Release

        - name: Collect all targets (Windows)
          shell: pwsh
          run: |
            # 确保 lib 目录存在并复制库文件
            tar -czvf bit7z-${{ github.event.inputs.bit7z_version }}-windows-msvc.tar.gz `
              bit7z-${{ github.event.inputs.bit7z_version }}/include `
              bit7z-${{ github.event.inputs.bit7z_version }}/lib `
              bit7z-${{ github.event.inputs.bit7z_version }}/cmake-opts.txt `
              7zip

        - name: Upload Artifact (Windows)
          uses: actions/upload-artifact@v4
          with: 
            name: bit7z-${{ github.event.inputs.bit7z_version }}-windows-msvc
            path: bit7z-${{ github.event.inputs.bit7z_version }}-windows-msvc.tar.gz

    release:
      runs-on: ubuntu-latest
      needs: [build-for-manylinux_2_28, build-for-windows]
      # 授予写入权限，允许创建 Release
      permissions:
        contents: write
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.bit7z_version != ''
      steps:
        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: ./artifacts

        - name: List downloaded files
          run: ls -la ./artifacts

        - name: Create GitHub Release and upload assets
          uses: softprops/action-gh-release@v2
          with:
            tag_name: bit7z-v${{ github.event.inputs.bit7z_version }}
            name: Release bit7z-v${{ github.event.inputs.bit7z_version }}
            body: |
              ## bit7z-${{ github.event.inputs.bit7z_version }}

              ### 📦Download notice:
                1. **Linux** (Uses manylinux_2_28 image): `bit7z-${{ github.event.inputs.bit7z_version }}-linux-gcc.tar.gz`
                2. **Windows** (Uses Windows-2022, MSVC 2022): `bit7z-${{ github.event.inputs.bit7z_version }}-windows-msvc.tar.gz`

              ### ✨Build environment:
                1. **Linux** : manylinux_2_28 (GCC 14.2.1) + ASM optimization (ASMC 2.36)
                2. **Windows**: Visual Studio 2022 (MSVC 2022) + ASM optimization (MASM)

              ### 🔧Contents
              - bit7z static library (`lib/x64/libbit7z.a` / `lib/x64/bit7z.lib`)
              - bit7z headers (`include/`)
              - 7-Zip shared library (`7z.so` / `7z.dll`)
            draft: false
            prerelease: false
            files: |
              ./artifacts/**/*.tar.gz
            overwrite: true   # 如果 tag 已存在则覆盖
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}